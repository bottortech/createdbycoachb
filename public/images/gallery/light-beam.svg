<svg xmlns="http://www.w3.org/2000/svg" width="400" height="800" viewBox="0 0 400 800" preserveAspectRatio="none">
  <defs>
    <!-- Main warm cone gradient — radiates from the top center outward -->
    <radialGradient id="coneGlow" cx="50%" cy="0%" r="75%" fx="50%" fy="0%">
      <stop offset="0%" stop-color="rgb(255, 240, 205)" stop-opacity="0.95" />
      <stop offset="6%" stop-color="rgb(255, 232, 180)" stop-opacity="0.78" />
      <stop offset="18%" stop-color="rgb(255, 220, 155)" stop-opacity="0.52" />
      <stop offset="38%" stop-color="rgb(245, 195, 120)" stop-opacity="0.28" />
      <stop offset="62%" stop-color="rgb(210, 160, 85)" stop-opacity="0.13" />
      <stop offset="85%" stop-color="rgb(170, 125, 60)" stop-opacity="0.04" />
      <stop offset="100%" stop-color="rgb(150, 110, 50)" stop-opacity="0" />
    </radialGradient>

    <!-- Vertical falloff so the light fades over distance -->
    <linearGradient id="verticalFade" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="1" />
      <stop offset="40%" stop-color="white" stop-opacity="0.8" />
      <stop offset="75%" stop-color="white" stop-opacity="0.35" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>

    <!-- Bright core glow at the apex (where the bulb sits) -->
    <radialGradient id="bulbCore" cx="50%" cy="2%" r="22%" fx="50%" fy="2%">
      <stop offset="0%" stop-color="rgb(255, 248, 220)" stop-opacity="1" />
      <stop offset="35%" stop-color="rgb(255, 235, 180)" stop-opacity="0.6" />
      <stop offset="100%" stop-color="rgb(255, 220, 150)" stop-opacity="0" />
    </radialGradient>

    <!-- Mask: combine the cone shape with vertical fade for natural falloff -->
    <mask id="beamMask">
      <rect width="400" height="800" fill="url(#verticalFade)" />
    </mask>

    <!-- Soft blur filter for atmospheric haze -->
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" />
    </filter>

    <filter id="heavyBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" />
    </filter>
  </defs>

  <!-- Outer haze — very wide soft glow for atmospheric volume -->
  <g mask="url(#beamMask)">
    <path
      d="M 200,0 L 400,800 L 0,800 Z"
      fill="url(#coneGlow)"
      filter="url(#heavyBlur)"
      opacity="0.7"
    />
  </g>

  <!-- Main cone body — defined volume of light -->
  <g mask="url(#beamMask)">
    <path
      d="M 200,0 L 360,800 L 40,800 Z"
      fill="url(#coneGlow)"
      filter="url(#softBlur)"
      opacity="0.85"
    />
  </g>

  <!-- Inner brighter cone — the heart of the beam -->
  <g mask="url(#beamMask)">
    <path
      d="M 200,0 L 290,800 L 110,800 Z"
      fill="url(#coneGlow)"
      filter="url(#softBlur)"
      opacity="0.6"
    />
  </g>

  <!-- Bulb core glow at the top -->
  <ellipse
    cx="200"
    cy="14"
    rx="60"
    ry="22"
    fill="url(#bulbCore)"
    filter="url(#softBlur)"
  />
</svg>
